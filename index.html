<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAUETS - Marcador Pro</title>
    <style>
        :root {
            --primary-color: #007bff;
            --bg-color: #f4f7f6;
            --panel-bg: #ffffff;
            --border-color: #e1e8ed;
            --text-color: #333;
            --total-bg: #e8f0fe;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-container {
            background-color: var(--panel-bg);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 95%;
            max-width: 1200px;
            overflow-x: auto;
        }

        h1 {
            text-align: center;
            color: var(--text-color);
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 2.5rem;
            border-bottom: 3px solid var(--primary-color);
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
            position: relative;
            padding-bottom: 5px;
            letter-spacing: 2px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }

        th {
            background-color: #f8f9fa;
            color: #555;
            font-weight: 600;
            padding: 15px 10px;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--border-color);
            text-align: center;
        }

        th:first-child { text-align: left; padding-left: 20px; }

        .header-input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--primary-color);
            font-weight: 700;
            font-family: inherit;
            font-size: 0.85rem;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 1px;
            cursor: text;
        }

        .header-input:focus {
            outline: none;
            background-color: #e8f0fe;
            border-radius: 4px;
        }

        td {
            border-bottom: 1px solid var(--border-color);
            padding: 0;
            height: 50px;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: #fbfcfd; }

        .cell-input {
            width: 100%;
            height: 100%;
            border: none;
            padding: 10px;
            box-sizing: border-box;
            font-size: 1.05rem;
            color: var(--text-color);
            background-color: transparent;
            text-align: center;
            transition: all 0.2s;
        }

        .name-input {
            text-align: left;
            padding-left: 20px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .cell-input:focus {
            outline: none;
            background-color: #e8f0fe;
        }

        .cell-input::-webkit-inner-spin-button,
        .cell-input::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .cell-input[type=number] { -moz-appearance: textfield; }

        /* === ESTILOS PARA EL GANADOR DE LA COLUMNA (+5) === */
        .ganador-columna {
            font-weight: 900 !important;
            color: #000 !important;
            background-color: #fff3cd !important; 
        }

        /* === ESTILOS PARA EL TOTAL === */
        .total-cell {
            background-color: var(--total-bg);
            font-weight: bold;
            font-size: 1.3rem;
            text-align: center;
            border-left: 2px solid var(--border-color);
            cursor: pointer;
            transition: all 0.4s ease;
            user-select: none;
        }

        .difuminado {
            color: transparent !important;
            text-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        /* === ESTILO PARA EL CAMPEÓN FINAL === */
        .campeon-final {
            background-color: #d4edda !important;
            color: #155724 !important;
            box-shadow: inset 0 0 0 3px #28a745;
            transform: scale(1.05);
        }

        /* === ZONA DE BOTONES === */
        .zona-botones {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 45px; /* Más apartado de la tabla */
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-revelar {
            background-color: #ffc107;
            color: #212529;
        }
        .btn-revelar:hover { background-color: #e0a800; }

        .btn-reset {
            background-color: #dc3545;
            color: white;
        }
        .btn-reset:hover { background-color: #c82333; }

    </style>
</head>
<body>

    <div class="main-container">
        <h1>🎲 DAUETS</h1>
        
        <table id="scoreTable">
            <thead>
                <tr>
                    <th style="width: 20%;">Nom</th>
                    <th>V</th>
                    <th>N</th>
                    <th>J</th>
                    <th>Q</th>
                    <th>K</th>
                    <th>As</th>
                    <th><input type="text" class="header-input" value="Cat. 1"></th>
                    <th><input type="text" class="header-input" value="Cat. 2"></th>
                    <th style="width: 15%;">Total</th>
                </tr>
            </thead>
            <tbody>
                <tr class="player-row">
                    <td><input type="text" class="cell-input name-input" placeholder="Jugador 1"></td>
                    <td><input type="number" class="cell-input score-input" min="0"></td>
                    <td><input type="number" class="cell-input score-input" min="0"></td>
                    <td><input type="number" class="cell-input score-input" min="0"></td>
                    <td><input type="number" class="cell-input score-input" min="0"></td>
                    <td><input type="number" class="cell-input score-input" min="0"></td>
                    <td><input type="number" class="cell-input score-input" min="0"></td>
                    <td><input type="number" class="cell-input score-input" min="0"></td>
                    <td><input type="number" class="cell-input score-input" min="0"></td>
                    <td class="total-cell difuminado" onclick="this.classList.toggle('difuminado')">0</td>
                </tr>
                <tr class="player-row">
                    <td><input type="text" class="cell-input name-input" placeholder="Jugador 2"></td>
                    <td><input type="number" class="cell-input score-input" min="0"></td>
                    <td><input type="number" class="cell-input score-input" min="0"></td>
                    <td><input type="number" class="cell-input score-input" min="0"></td>
                    <td><input type="number" class="cell-input score-input" min="0"></td>
                    <td><input type="number" class="cell-input score-input" min="0"></td>
                    <td><input type="number" class="cell-input score-input" min="0"></td>
                    <td><input type="number" class="cell-input score-input" min="0"></td>
                    <td><input type="number" class="cell-input score-input" min="0"></td>
                    <td class="total-cell difuminado" onclick="this.classList.toggle('difuminado')">0</td>
                </tr>
                <tr class="player-row">
                    <td><input type="text" class="cell-input name-input" placeholder="Jugador 3"></td>
                    <td><input type="number" class="cell-input score-input" min="0"></td>
                    <td><input type="number" class="cell-input score-input" min="0"></td>
                    <td><input type="number" class="cell-input score-input" min="0"></td>
                    <td><input type="number" class="cell-input score-input" min="0"></td>
                    <td><input type="number" class="cell-input score-input" min="0"></td>
                    <td><input type="number" class="cell-input score-input" min="0"></td>
                    <td><input type="number" class="cell-input score-input" min="0"></td>
                    <td><input type="number" class="cell-input score-input" min="0"></td>
                    <td class="total-cell difuminado" onclick="this.classList.toggle('difuminado')">0</td>
                </tr>
                <tr class="player-row">
                    <td><input type="text" class="cell-input name-input" placeholder="Jugador 4"></td>
                    <td><input type="number" class="cell-input score-input" min="0"></td>
                    <td><input type="number" class="cell-input score-input" min="0"></td>
                    <td><input type="number" class="cell-input score-input" min="0"></td>
                    <td><input type="number" class="cell-input score-input" min="0"></td>
                    <td><input type="number" class="cell-input score-input" min="0"></td>
                    <td><input type="number" class="cell-input score-input" min="0"></td>
                    <td><input type="number" class="cell-input score-input" min="0"></td>
                    <td><input type="number" class="cell-input score-input" min="0"></td>
                    <td class="total-cell difuminado" onclick="this.classList.toggle('difuminado')">0</td>
                </tr>
            </tbody>
        </table>

        <div class="zona-botones">
            <button class="btn btn-revelar" onclick="revelarGanador()">
                🏆 Guanyador
            </button>
            <button class="btn btn-reset" onclick="resetearTabla()">
                🗑️ Reinici
            </button>
        </div>
    </div>

    <script>
        const filas = document.querySelectorAll('.player-row');
        const numColumnasPuntuacion = 8; // Columnas de puntuación (V a Cat 2)

        // Escuchamos los cambios en CUALQUIER input de puntuación
        document.querySelectorAll('.score-input').forEach(input => {
            input.addEventListener('input', recalcularTodo);
        });

        function recalcularTodo() {
            // 1. Analizamos columna por columna (Bonus +5)
            for (let col = 0; col < numColumnasPuntuacion; col++) {
                let maxPuntuacion = -Infinity;
                let inputsDeEstaColumna = [];

                filas.forEach(fila => {
                    const input = fila.querySelectorAll('.score-input')[col];
                    inputsDeEstaColumna.push(input);
                    const valor = parseFloat(input.value);
                    if (!isNaN(valor) && valor > maxPuntuacion) {
                        maxPuntuacion = valor;
                    }
                });

                inputsDeEstaColumna.forEach(input => {
                    input.classList.remove('ganador-columna');
                    const valor = parseFloat(input.value);
                    if (!isNaN(valor) && valor === maxPuntuacion && valor > 0) {
                        input.classList.add('ganador-columna');
                    }
                });
            }

            // 2. Recalculamos el Total
            filas.forEach(fila => {
                const inputsPuntuacion = fila.querySelectorAll('.score-input');
                const celdaTotal = fila.querySelector('.total-cell');
                let sumaTotal = 0;

                inputsPuntuacion.forEach(input => {
                    const valor = parseFloat(input.value);
                    if (!isNaN(valor)) {
                        sumaTotal += valor;
                        if (input.classList.contains('ganador-columna')) {
                            sumaTotal += 5; // Suma del bonus
                        }
                    }
                });

                celdaTotal.innerText = sumaTotal;
            });
            
            // Si alguien sigue escribiendo, quitamos el estilo de "campeón" por si acaso
            document.querySelectorAll('.total-cell').forEach(celda => {
                celda.classList.remove('campeon-final');
            });
        }

        function revelarGanador() {
            let maxTotal = -Infinity;
            let celdasGanadoras = [];

            // Quitamos el difuminado a todos y buscamos la puntuación más alta
            document.querySelectorAll('.player-row').forEach(fila => {
                const celdaTotal = fila.querySelector('.total-cell');
                celdaTotal.classList.remove('difuminado'); // Adiós niebla
                
                const puntuacion = parseInt(celdaTotal.innerText);
                
                if (puntuacion > maxTotal) {
                    maxTotal = puntuacion;
                    celdasGanadoras = [celdaTotal];
                } else if (puntuacion === maxTotal) {
                    celdasGanadoras.push(celdaTotal); // Empate
                }
            });

            // Si hay puntos en la mesa, iluminamos al ganador
            if (maxTotal > 0) {
                celdasGanadoras.forEach(celda => celda.classList.add('campeon-final'));
            } else {
                alert("¡Todavía no hay puntos en el marcador!");
            }
        }

        function resetearTabla() {
            if(confirm("¿Seguro que quieres limpiar la mesa y empezar de cero?")) {
                document.querySelectorAll('.cell-input:not(.name-input)').forEach(input => {
                    input.value = '';
                    input.classList.remove('ganador-columna');
                });
                document.querySelectorAll('.total-cell').forEach(total => {
                    total.innerText = '0';
                    total.classList.add('difuminado');
                    total.classList.remove('campeon-final'); // Quitamos la corona
                });
            }
        }
    </script>

</body>
</html>
