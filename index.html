<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="text/javascript" src="data.js"></script>
    <script type="text/javascript" src="tornejos.js"></script>
    <script type="text/javascript" src="script.js"></script>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <style>
    table, th, td {
      border: 1px solid black;
      border-collapse: collapse;
    }
    td {
        width: 60pt;
        text-align: center;
    }
    </style>
    <title>Dauets</title>
</head>
<body>
    <h1>Dauets</h1>

    <div>
        <p>Adreces d'interès:</p>

        <ul id="adreces_interes">
            <li><a href="/jugadors.html">Cercador de jugadors</a></li>
            <li><a href="/marcador.html">Marcador</a></li>
        </ul>
    </div>

    <h2>Rànquing de Dauets Professional</h2>
    <div id="classificacio">
    </div>

    <script>
        for (var i = 0; i < _tornejos.length; i ++) {
            var li = document.createElement("li");
            var link = document.createElement("a");
            link.href = "/tornejos/" + _tornejos[i].abreviatura + ".html";
            link.innerHTML = _tornejos[i].nom;
            li.appendChild(link);
            document.getElementById("adreces_interes").appendChild(li);
        }

        document.getElementById("classificacio").innerHTML = dibuixar_taula_llista(taula_classificacio_ultim_any(_tornejos));
    </script>
</body>
</html>
