<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="text/javascript" src="data.js"></script>
    <title>Dauets</title>
</head>
<body>
    <h1>Dauets</h1>

    <div>
        <p>Adreces d'interès:</p>

        <ul id="adreces_interes">
            <li><a href="/jugadors.html">Cercador de jugadors</a></li>
            <li><a href="/marcador.html">Marcador</a></li>
        </ul>
    </div>

    <script>
        for (var i = 0; i < _tornejos.length; i ++) {
            var li = document.createElement("li");
            var link = document.createElement("a");
            link.href = "/tornejos/" + _tornejos[i].abreviatura + ".html";
            link.innerHTML = _tornejos[i].nom;
            li.appendChild(link);
            document.getElementById("adreces_interes").appendChild(li);
        }
    </script>
</body>
</html>
