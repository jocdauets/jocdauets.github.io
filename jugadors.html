<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<script type="text/javascript" src="data.js"></script>
	<script type="text/javascript" src="jugadors.js"></script>
	<script type="text/javascript" src="script.js"></script>
	<style>
	table, th, td {
	  border: 1px solid black;
	  border-collapse: collapse;
	}
	td {
		width: 50pt;
		text-align: center;
	}
	</style>
	<title>Cercador de jugadors</title>
</head>
<body>
	<label for="jugador">Jugador: </label>
	<input type="text" name="jugador" id="jugador">
	<button type="button" onclick="cercar()">Cercar</button>

	<br>
	<div id="titol"></div>

	<div id="resultats"></div>

	<br>
	<p>Atenció! Només es mostren les estadístiques de les partides registrades. Malauradament hi ha algunes partides oficials no registrades.</p>

	<script>
		const cat_especials = categories_especials(_partides);
		const cats = categories_basiques.concat(cat_especials);
		var cats_negreta = [""];
		for (var i = 0; i < cats.length; i ++) {
			cats_negreta.push("<b>" + cats[i] + "</b>");
		}

		function cercar(){
			const output = document.getElementById("resultats")
			output.innerHTML = "";
			var output_text = "";
			const jugador = document.getElementById("jugador").value;

			// Títol
			document.getElementById("titol").innerHTML = "<h1>" + jugador;
			const prm = puntuacio_relativa_mitjana(jugador, _partides);
			if (prm != -1) {
				document.getElementById("titol").innerHTML = "<h1>" + jugador + " (" + Math.round(prm).toString() + ")</h1>";

				// General
				output_text += "<h2>General</h2><ul>";
				output_text += "<li><b>Partides registrades:</b> " + partides_amb_cert_jugador(jugador,_partides).length.toString() + "</li>";
				output_text += "<li><b>% victòries:</b> " + Math.round(percentatge_victories(jugador,_partides)).toString() + "%</li>";
				output_text += "<li><b>Màxima puntuació:</b> " + maxima_puntuacio(jugador, _partides).toString() + "</li>";
				output_text += "</ul>";

				// Mitjanes
				const mitjs = mitjanes(jugador, _partides);
				var fila_mitjanes = ["Mitjana"];
				for (var i = 0; i < cats.length; i ++) {
					if (mitjs[cats[i]] == -1) {
						fila_mitjanes.push("-");
					} else {
						fila_mitjanes.push(Math.round(10*mitjs[cats[i]])/10);
					}
				}

				// Fora condicions estàndard

				output_text += "<h2>Per categories</h2>" + dibuixar_taula_llista([cats_negreta, fila_mitjanes]);

				output.innerHTML = output_text;
			}
		}
	</script>
</body>
</html>
