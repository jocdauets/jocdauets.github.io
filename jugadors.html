<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<script type="text/javascript" src="data.js"></script>
	<script type="text/javascript" src="jugadors.js"></script>
	<script type="text/javascript" src="tornejos.js"></script>
	<script type="text/javascript" src="script.js"></script>
	<style>
	table, th, td {
	  border: 1px solid black;
	  border-collapse: collapse;
	}
	td {
		width: 60pt;
		text-align: center;
	}
	.info-fce {
		display: none;
	}
	.text-fce:hover + .info-fce {
		display: block;
		color: red;
		font-size: 10px;
	}
	.gray {
		color: gray;
	}
	</style>
	<title>Cercador de jugadors</title>
</head>
<body>
	<label for="jugador">Jugador: </label>
	<input type="text" name="jugador" id="jugador">
	<button type="button" onclick="cercar()">Cercar</button>

	<br>
	<div id="titol"></div>

	<div id="resultats"></div>

	<div id="tornejos"></div>

	<br>
	<p>Atenció! Només es mostren les estadístiques de les partides registrades. Malauradament hi ha algunes partides oficials no registrades.</p>

	<script>
		const resultats = document.getElementById("resultats");
		const cat_especials = categories_especials(_partides);
		const cats = categories_basiques.concat(cat_especials);
		var cats_negreta = [""];
		var cats_negreta_basiques = [""];
		var cats_negreta_especials = [""];
		var cats_negreta_dauets = [""];
		for (var i = 0; i < cats.length; i ++) {
			if (cats[i] != "buida") {
				cats_negreta.push("<b>" + cats[i] + "</b>");
				if (categories_basiques.includes(cats[i])) {
					cats_negreta_basiques.push("<b>" + cats[i] + "</b>");
				} else {
					if (cats[i].split("(")[0] == "dauet") {
						cats_negreta_dauets.push(("<b>" + cats[i] + "</b>"));
					} else {
						cats_negreta_especials.push(("<b>" + cats[i] + "</b>"));
					}
				}
			}
		}

		function cercar(){
			const jugador = document.getElementById("jugador").value;
			resultats.innerHTML = "";

			// Títol
			document.getElementById("titol").innerHTML = "<h1>" + jugador;
			const prm = puntuacio_relativa_mitjana(jugador, _partides);
			if (prm != -1) {
				document.getElementById("titol").innerHTML = "<h1>" + jugador + " (" + (Math.round(prm + percentatge_victories(jugador,_partides)/10)).toString() + ")</h1>";

				// General
				var div_general = document.createElement("div");
				var text = "";
				text += "<h2>General</h2><ul>";
				text += "<li><b>Partides registrades:</b> " + partides_amb_cert_jugador(jugador,_partides).length.toString() + "</li>";
				text += "<li><b>% victòries:</b> " + (Math.round(10*percentatge_victories(jugador,_partides))/10).toString() + "%</li>";
				text += "<li><b>Màxima puntuació:</b> " + maxima_puntuacio(jugador, _partides).toString() + "</li>";
				text += "<li><b>Puntuació relativa mitjana:</b> " + (Math.round(10*puntuacio_relativa_mitjana(jugador, _partides))/10).toString() + "</li>";
				text += "</ul>";
				div_general.innerHTML = text;
				resultats.appendChild(div_general);

				// Mitjanes, màximes, fce
				const mitjs = mitjanes(jugador, _partides);
				var fila_mitjanes = ["Mitjana"];
				var fila_maximes = ["Màxima"];
				var fila_fce = ["<div class=\"text-fce\">FCE</div><div class=\"info-fce\"><p>FCE = tirades fora de les condicions estàndard</p></div>"];
				var fila_propines = ["Propines"];
				var fila_penyores = ["Penyores"];
				var fila_tatxar = ["Tatxar"];
				for (var i = 0; i < cats.length; i ++) {
					if (cats[i] != "buida") {
						if (mitjs[cats[i]] == -1) {
							fila_mitjanes.push("-");
							fila_maximes.push("-");
							fila_fce.push("-")
							fila_propines.push("-");
							fila_penyores.push("-");
							fila_tatxar.push("-");
						} else {
							fila_mitjanes.push(Math.round(10*mitjs[cats[i]])/10);
							fila_maximes.push(maxima_puntuacio_categoria(jugador, cats[i], _partides));
							var fce = percentatge_fora_condicions_estandard(jugador, cats[i], _partides);
							if (fce == -2) {
								fila_fce.push("###");
							} else {
								var rounded_fce = Math.round(10*fce)/10;
								if (rounded_fce == 0) {
									fila_fce.push("<div class=\"gray\">" + rounded_fce.toString() + "%</div>");
								} else {
									fila_fce.push(rounded_fce.toString() + "%");
								}
							}
							var rounded_propines = Math.round(percentatge_propines(jugador,cats[i],_partides));
							if (rounded_propines == 0) {
								fila_propines.push("<div class=\"gray\">" + rounded_propines.toString() + "%</div>");
							}
							else {
								fila_propines.push(rounded_propines.toString() + "%");
							}

							var penyores = percentatge_penyores(jugador, cats[i], _partides);
							if (penyores == -1) {
								fila_penyores.push("-");
							} else {
								var rounded_penyores = Math.round(penyores);
								if (rounded_penyores == 0) {
									fila_penyores.push("<div class=\"gray\">" + rounded_penyores.toString() + "%</div>");
								} else {
									fila_penyores.push(rounded_penyores.toString() + "%");
								}
							}

							var tatxar = percentatge_tatxar(jugador, cats[i], _partides);
							if (tatxar == -1) {
								fila_tatxar.push("-");
							} else {
								var rounded_tatxar = Math.round(tatxar);
								if (rounded_tatxar == 0) {
									fila_tatxar.push("<div class=\"gray\">" + rounded_tatxar.toString() + "%</div>");
								} else {
									fila_tatxar.push(rounded_tatxar.toString() + "%");
								}
							}
						}
					}
				}

				var div_categories = document.createElement("div");
				div_categories.innerHTML = "<h2>Categories</h2>";

				// A continuació falta afegir la fila de "tatxar"

				// Categories bàsiques
				var div_cat_basiques = document.createElement("div");
				div_cat_basiques.innerHTML = "<h3>Bàsiques</h3>" + dibuixar_taula_llista([cats_negreta, fila_mitjanes, fila_maximes, fila_propines, fila_penyores, fila_fce], cats_negreta_basiques);
				div_categories.appendChild(div_cat_basiques);

				// Categories especials
				var div_cat_especials = document.createElement("div");
				div_cat_especials.innerHTML = "<h3>Especials (sense dauets)</h3>" + dibuixar_taula_llista([cats_negreta, fila_mitjanes, fila_maximes, fila_propines, fila_penyores, fila_fce], cats_negreta_especials);
				div_categories.appendChild(div_cat_especials);

				// Categories bàsiques
				var div_dauets = document.createElement("div");
				div_dauets.innerHTML = "<h3>Dauets</h3>" + dibuixar_taula_llista([cats_negreta, fila_mitjanes, fila_maximes, fila_propines, fila_penyores, fila_fce], cats_negreta_dauets);
				div_categories.appendChild(div_dauets)

				resultats.appendChild(div_categories);

				// tornejos
				var div_tornejos = document.createElement("div");
				div_tornejos.innerHTML = "<h2>Tornejos</h2>";
				var llista = document.createElement("ul");
				const tornejos = tornejos_amb_cert_jugador(jugador, _tornejos);
				for (var i = 0; i < tornejos.length; i ++) {
					var li = document.createElement("li");
					li.innerHTML = tornejos[i].nom + " (";
					var link = document.createElement("a");
					link.href = "jocdauets.github.io/tornejos/" + tornejos[i].abreviatura + ".html";
					link.innerHTML = tornejos[i].abreviatura;
					li.appendChild(link);
					li.innerHTML += ")";
					llista.appendChild(li);
				}
				div_tornejos.appendChild(llista);
				resultats.appendChild(div_tornejos);
			}
		}
	</script>
</body>
</html>
