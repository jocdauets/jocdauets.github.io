<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<script type="text/javascript" src="estrategies_solitari.js"></script>
	<script type="text/javascript" src="jugadors.js"></script>
	<style>
		#marcador table, #marcador th, #marcador td {
		  border: 1px solid black;
		  border-collapse: collapse;
		}
		td {
			width: 60pt;
			text-align: center;
		}
	</style>
	<title>Dauets solitari</title>
</head>
<body>
	<div id="configuracio">
		<label>Nom: </label><input type="text" id="nom"/>
		<p>Ordena els jugadors (0 = no juga):</p>
		<label>Jugador/a: </label><input type="number" id="ordre-jugador" value=1/>
		<br>
		<label>&lt;Tomeu&gt;: </label><input type="number" id="ordre-tomeu" value=2/>
		<br>
		<label>Categories especials: </label>
		<select id="categoria_especial1" value="1">
			<option value="4/4">4/4</option>
			<option value="color">Color</option>
			<option value="forma">Forma</option>
		</select>
		<select id="categoria_especial2" value="2">
			<option value="4/4">4/4</option>
			<option value="color">Color</option>
			<option value="forma">Forma</option>
		</select>
		<br>
		<button id="jugar" onclick="jugar()">Jugar</button>
	</div>

	<br><br><br>

	<div id="taulell"></div>

	<br>

	<div id="marcador"></div>

	<script>
		var index_jugador;
		var nom_jugador;
		const noms_html = {"<Tomeu>": "&lt;Tomeu&gt;"};
		var noms;
		var n_jugadors;
		var cal_tirar;
		var cat_especials;
		var n_cat_especials;
		var torn;
		var fixat;
		var daus;
		var obligatori;
		var tirada;
		var marcador;
		var fcer;

		function jugar() {
			noms = [];
			var error = false;
			index_jugador = document.getElementById("ordre-jugador").value;
			if (index_jugador == null || index_jugador <= 0) {
				alert("Que no vols jugar, beneit?");
				error = true;
			} else {
				nom_jugador = document.getElementById("nom").value;
				if (nom_jugador == "") {
					nom_jugador = "Jugador/a";
				}
				var noms_totals = [nom_jugador, "<Tomeu>"];
				var posicions = [index_jugador, document.getElementById("ordre-tomeu").value];
				var comprovats = [];
				for (var i = 0; i < noms_totals.length; i ++) {
					if (posicions[i] <= 0) {
						comprovats.push(posicions[i]);
					}
				}
				while (comprovats.length < noms_totals.length) {
					var valor_maxim = Infinity;
					var index_maxim = -1;
					for (var i =  0; i < noms_totals.length; i ++) {
						if (comprovats.includes(noms_totals[i]) == false && posicions[i] <= valor_maxim) {
							valor_maxim = posicions[i];
							index_maxim = i;
						}
					}
					comprovats.push(noms_totals[index_maxim]);
					noms.push(noms_totals[index_maxim]);
				}
				index_jugador = noms.indexOf(nom_jugador);
				n_jugadors = noms.length;

				cat_especials = [document.getElementById("categoria_especial1").value, document.getElementById("categoria_especial2").value];
				if (cat_especials[0] == cat_especials[1]) {
					alert("Les categories especials han de ser diferents.");
					error = true;
				} else {
					n_cat_especials = cat_especials.length;
				}
			}
			if (error == false) {
				cal_tirar = false;
				torn = 0;
				fixat = [false,false,false,false,false,false,false,false];
				daus = [null,null,null,null,null,null,null,null];
				obligatori = null;
				tirada = 0;
				marcador = {};
				fcer = {};
				for (var i = 0; i < n_jugadors; i ++) {
					marcador[noms[i]] = [null,null,null,null,null,null];
					fcer[noms[i]] = [false,false,false,false,false,false];
					for (var j = 0; j < n_cat_especials; j ++) {
						marcador[noms[i]].push(null);
						fcer[noms[i]].push(false);
					}
				}

				// creació taulell
				const div_taulell = document.getElementById("taulell");
				div_taulell.innerHTML = "";
				var taula_taulell = document.createElement("table");
				var tr1 = document.createElement("tr");
				for (var i = 0; i < 4; i ++) {
					var td = document.createElement("td");
					const i_val = i;
					td.id = "dau" + i.toString();
					td.class = "dau";
					td.onclick = function() {jugador_fixar(i_val)};
					tr1.appendChild(td);
				}
				taula_taulell.appendChild(tr1);
				var tr2 = document.createElement("tr");
				for (var i = 0; i < 4; i ++) {
					var td = document.createElement("td");
					const i_val = i;
					td.id = "dau" + (i+4).toString();
					td.class = "dau";
					td.onclick = function() {jugador_fixar(i_val+4);}
					tr2.appendChild(td);
				}
				taula_taulell.appendChild(tr2);
				div_taulell.appendChild(taula_taulell);
				div_taulell.appendChild(document.createElement("br"));
				var boto_taulell = document.createElement("button");
				boto_taulell.onclick = function() {jugador_tirar();}
				boto_taulell.innerHTML = "Tirar";
				div_taulell.appendChild(boto_taulell);

				// marcador
				const div_marcador = document.getElementById("marcador");
				div_marcador.innerHTML = "";
				var taula_marcador = document.createElement("table");
				var header_marcador = document.createElement("tr");
				var headers = ["","V","N","J","Q","K","A"].concat(cat_especials).concat(["Suma"]);
				for (var i = 0; i < headers.length; i ++) {
					var th = document.createElement("th");
					if (i > 0) {
						th.innerHTML = headers[i][0].toUpperCase() + headers[i].slice(1);
					}
					header_marcador.appendChild(th);
				}
				taula_marcador.appendChild(header_marcador);
				for (var i = 0; i < n_jugadors; i ++) {
					var tr = document.createElement("tr");
					var td_nom = document.createElement("td");
					if (i == index_jugador) {
						td_nom.innerHTML = noms[i];
					} else {
						td_nom.innerHTML = noms_html[noms[i]];
					}
					tr.appendChild(td_nom);
					for (var j = 0; j < 6+n_cat_especials; j ++) {
						var td_cat = document.createElement("td");
						td_cat.id = (i+1).toString() + "-" + j.toString();
						td_cat.class = "marcador";
						if (i == index_jugador) {
							const j_val = j;
							td_cat.onclick = function() {jugador_puntuar(j_val);}
						}
						tr.appendChild(td_cat);
					}
					var td_suma = document.createElement("td");
					td_suma.id = (i+1).toString() + "-suma";
					tr.appendChild(td_suma);
					taula_marcador.appendChild(tr);
				}
				div_marcador.appendChild(taula_marcador);
				mostrar();
				if (index_jugador != 0) {
					rival();
				}
			}
		}
		
		function jugador_tirar() {
			if (torn%n_jugadors == index_jugador) {
				tirar();

			} else {
				alert("No és el teu torn.");
			}
		}

		// aquesta functió triga 450 ms
		function tirar() {
			if (tirada < 3) {
				cal_tirar = false;
				for (var i = 0; i < 8; i ++) {
					if (fixat[i] == false) {
						daus[i] = null;
					}
				}
				mostrar();
				setTimeout(function(){
					for (var i = 0; i < 8; i ++) {
						if (fixat[i] == false) {
							daus[i] = Math.floor(Math.random()*6);
						}
					}
					mostrar();
					setTimeout(function(){
						for (var i = 0; i < 8; i ++) {
							if (fixat[i] == false) {
								daus[i] = null;
							}
						}
						mostrar();
						setTimeout(function(){
							for (var i = 0; i < 8; i ++) {
								if (fixat[i] == false) {
									daus[i] = Math.floor(Math.random()*6);
								}
							}
							mostrar();
							for (var i = 0; i < 8; i ++) {
								if (fixat[i] == false) {
									daus[i] = null;
								}
							}
							mostrar();
							setTimeout(function(){
								for (var i = 0; i < 8; i ++) {
									if (fixat[i] == false) {
										daus[i] = Math.floor(Math.random()*6);
									}
								}
								mostrar();
								setTimeout(function(){
									for (var i = 0; i < 8; i ++) {
										if (fixat[i] == false) {
											daus[i] = null;
										}
									}
									mostrar();
									setTimeout(function(){
										for (var i = 0; i < 8; i ++) {
											if (fixat[i] == false) {
												daus[i] = Math.floor(Math.random()*6);
											}
										}
										tirada ++;
										mostrar();
									}, 50);
								}, 100);
							}, 50);
						}, 100);
					}, 50);
				}, 100);
			} else {
				alert("Ja has tirat tres cops.");
			}
		}

		function jugador_fixar(i) {
			console.log(i);
			if (torn%n_jugadors == index_jugador) {
				fixar(i);
			} else {
				alert("No toquis!");
			}
		}

		function fixar(i) {
			if (cal_tirar == true) {
				alert("Has de tirar!");
			} else if (tirada != 0) {
				if (fixat[i] == true) {
					fixat[i] = false;
				} else {
					fixat[i] = true;
				}
			} else {
				alert("Aquests daus no són teus.");
			}
			mostrar();
		}

		function mostrar() {
			for (var i = 0; i < 8; i ++) {
				const cella = document.getElementById("dau" + i.toString());
				cella.innerHTML = "";
				const imatge_dau = document.createElement("img");
				if (daus[i] == null) {
					imatge_dau.src = "./bit/dau_buit.png";
				} else {
					imatge_dau.src = "./bit/dau_" + (["V","N","J","Q","K","A"][daus[i]]) + ".png";
				}
				imatge_dau.width = "50";
				imatge_dau.height = "50";
				cella.appendChild(imatge_dau);
				if (fixat[i] == true) {
					cella.style.backgroundColor = "LightGray";
				} else {
					cella.style.backgroundColor = "white";
				}
			}
		}

		function jugador_puntuar(categoria) {
			if (torn%n_jugadors != index_jugador) {
				alert("No et toca!");
			} else {
				puntuar(categoria);
			}
		}

		function puntuar(categoria) {
			var nom_categoria = categoria;
			if (categoria > 5) {
				nom_categoria = cat_especials[categoria-6];
			}
			var jugador = torn%n_jugadors;
			if (cal_tirar == true || tirada == 0) {
				alert("Has de tirar!");
			} else if (obligatori != null && nom_categoria != obligatori) {
				alert("Ja tens una categoria fixa.");
			} else {
				var distribucio = [0,0,0,0,0,0];
				for (var i = 0; i < 8; i ++) {
					distribucio[daus[i]] ++;
				}
				const punts = evaluar(nom_categoria, distribucio);
				var complet = false;
				if ([0,1,2,3,4,5].includes(categoria)) {
					if (punts == (categoria+1)*8) {
						complet = true;
					}
				} else {
					if (punts != 0) {
						complet = true;
					}
				}
				if (marcador[noms[jugador]][categoria] == null && tirada >= 3) {
					marcador[noms[jugador]][categoria] = punts;
					actualitzar_taula();

					torn ++;
					tirada = 0;
					obligatori = null;
					for (var i = 0; i < 8; i ++) {
						fixat[i] = false;
					}
				} else if (tirada < 3) {
					if (complet == true) {
						obligatori = nom_categoria;
						cal_tirar = true;
						fcer[noms[jugador]][categoria] = true;
						if (marcador[noms[jugador]][categoria] == null) {
							marcador[noms[jugador]][categoria] = punts;
						} else {
							marcador[noms[jugador]][categoria] += punts;
						}
						for (var i = 0; i < 8; i ++) {
							fixat[i] = false;
						}
						actualitzar_taula();
					} else {
						alert("Encara et queden tirades.");
					}
				} else {
					if (fcer[noms[jugador]][categoria] == true) {
						marcador[noms[jugador]][categoria] += punts;
						torn ++;
						tirada = 0;
						obligatori = null;
						for (var i = 0; i < 8; i ++) {
							fixat[i] = false;
						}
						actualitzar_taula();
					} else {
						alert("Ja has puntuat en aquesta categoria.");
					}
				}
				mostrar();
			}
			if (tirada == 0) {
				if (torn == n_jugadors*(6+n_cat_especials)) {
					puntuacions_finals = puntuacions({"jugadors": noms, "categories_especials": cat_especials, "puntuacions": marcador});
					for (var i = 0; i < n_jugadors; i ++) {
						document.getElementById((i+1).toString() + "-suma").innerHTML = puntuacions_finals[noms[i]];
					}
				} else if (torn%n_jugadors != index_jugador) {
					rival();
				}
			}
		}

		function actualitzar_taula() {
			for (var jugador = 0; jugador < n_jugadors; jugador ++) {
				for (var i = 0; i < 6+n_cat_especials; i ++) {
					if (marcador[noms[jugador]][i] == null) {
						document.getElementById((jugador+1).toString() + "-" + i.toString()).innerHTML = "";
					} else {
						document.getElementById((jugador+1).toString() + "-" + i.toString()).innerHTML = marcador[noms[jugador]][i].toString();
					}
				}
			}
		}

		function rival() {
			if (torn%n_jugadors != index_jugador) {
				const nom = noms[torn%n_jugadors];
				var completades = [];
				for (var i = 0; i < 6; i ++) {
					if (marcador[nom][i] != null) {
						completades.push(i);
					}
				}
				for (var i = 0; i < n_cat_especials; i ++) {
					if (marcador[nom][6+i] != null) {
						completades.push(cat_especials[i]);
					}
				}
				const estrategia = constructor_estrategia(nom, cat_especials);
				setTimeout(function() {
					// primera tirada
					tirar();
					setTimeout(function() {
						var taulell = [0,0,0,0,0,0];
						for (var i = 0; i < 8; i ++) {
							taulell[daus[i]] ++;
						}
						var resultat = estrategia.actuar(taulell,completades,obligatori);
						var previ_fixat = resultat[1];
						var quantitat = resultat[0];

						setTimeout(function() {
							for (var i = 0; i < 8; i ++) {
								if (quantitat[daus[i]] > 0) {
									fixar(i);
									quantitat[daus[i]] --;
								}
							}
							if (resultat[1] == true) {
								if ([0,1,2,3,4,5].includes(resultat[2])) {
									puntuar(resultat[2]);
								} else {
									puntuar(6+cat_especials.indexOf(resultat[2]));
								}
							}
							obligatori = resultat[2];


							setTimeout(function() {
								// segona tirada
								tirar();
								setTimeout(function() {
									var taulell = [0,0,0,0,0,0];
									for (var i = 0; i < 8; i ++) {
										taulell[daus[i]] ++;
									}
									var resultat = estrategia.actuar(taulell,completades,obligatori);
									var quantitat = resultat[0];

									setTimeout(function() {
										if (previ_fixat == false) {
											fixat = [false,false,false,false,false,false,false,false];
											for (var i = 0; i < 8; i ++) {
												if (quantitat[daus[i]] > 0) {
													fixar(i);
													quantitat[daus[i]] --;
												}
											}
										}
										previ_fixat = resultat[1];
										if (resultat[1] == true) {
											if ([0,1,2,3,4,5].includes(resultat[2])) {
												puntuar(resultat[2]);
											} else {
												puntuar(6+cat_especials.indexOf(resultat[2]));
											}
										}
										obligatori = resultat[2];


										setTimeout(function() {
											// tercera tirada
											tirar();
											setTimeout(function() {
												var taulell = [0,0,0,0,0,0];
												for (var i = 0; i < 8; i ++) {
													taulell[daus[i]] ++;
												}
												var resultat = estrategia.actuar(taulell,completades,obligatori,ultima=true);
												var quantitat = resultat[0];

												setTimeout(function() {
													if ([0,1,2,3,4,5].includes(resultat[2])) {
														puntuar(resultat[2]);
													} else {
														puntuar(6+cat_especials.indexOf(resultat[2]));
													}

												}, 2000);
											}, 500);
										}, 1000);
									}, 2000);
								}, 500);
							}, 1000);
						}, 2000);
					}, 500);
				}, 1000);
			}
		}

	</script>
</body>
</html>
