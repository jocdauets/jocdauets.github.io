<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<script type="text/javascript" src="estrategies_solitari.js"></script>
	<script type="text/javascript" src="jugadors.js"></script>
	<style>
		#marcador table, #marcador th, #marcador td {
		  border: 1px solid black;
		  border-collapse: collapse;
		}
		td {
			width: 60pt;
			text-align: center;
		}
	</style>
	<title>Dauets solitari</title>
</head>
<body>
	<div id="taulell">
		<table>
			<tr>
				<td id="dau0" class="dau" onclick="fixar(0)"></td>
				<td id="dau1" class="dau" onclick="fixar(1)"></td>
				<td id="dau2" class="dau" onclick="fixar(2)"></td>
				<td id="dau3" class="dau" onclick="fixar(3)"></td>
			</tr>
			<tr>
				<td id="dau4" class="dau" onclick="fixar(4)"></td>
				<td id="dau5" class="dau" onclick="fixar(5)"></td>
				<td id="dau6" class="dau" onclick="fixar(6)"></td>
				<td id="dau7" class="dau" onclick="fixar(7)"></td>
			</tr>
		</table>
		<br>
		<button onclick="jugador_tirar()">Tirar</button>
	</div>

	<br>

	<div id="marcador">
		<table>
			<head>
				<th></th>
				<th>V</th>
				<th>N</th>
				<th>J</th>
				<th>Q</th>
				<th>K</th>
				<th>A</th>
				<th>4/4</th>	
				<th>Color</th>
				<th>Suma</th>
			</head>
			<tr>
				<td>Jugador/a</td>
				<td id="1-0" class="marcador" onclick="jugador_puntuar(0)"></td>
				<td id="1-1" class="marcador" onclick="jugador_puntuar(1)"></td>
				<td id="1-2" class="marcador" onclick="jugador_puntuar(2)"></td>
				<td id="1-3" class="marcador" onclick="jugador_puntuar(3)"></td>
				<td id="1-4" class="marcador" onclick="jugador_puntuar(4)"></td>
				<td id="1-5" class="marcador" onclick="jugador_puntuar(5)"></td>
				<td id="1-6" class="marcador" onclick="jugador_puntuar(6)"></td>
				<td id="1-7" class="marcador" onclick="jugador_puntuar(7)"></td>
				<td id="1-suma" class="marcador"></td>
			</tr>
			<tr>
				<td>&lt;Tomeu&gt;</td>
				<td id="2-0" class="marcador"></td>
				<td id="2-1" class="marcador"></td>
				<td id="2-2" class="marcador"></td>
				<td id="2-3" class="marcador"></td>
				<td id="2-4" class="marcador"></td>
				<td id="2-5" class="marcador"></td>
				<td id="2-6" class="marcador"></td>
				<td id="2-7" class="marcador"></td>
				<td id="2-suma" class="marcador"></td>
			</tr>
		</table>
	</div>

	<script>
		const index_jugador = 0;
		const noms = ["Jugador/a", "<Tomeu>"];
		const n_jugadors = noms.length;
		var cal_tirar = false;
		const cat_especials = ["4/4","color"];
		const n_cat_especials = cat_especials.length;
		var torn = 0;
		var fixat = [false,false,false,false,false,false,false,false];
		var daus = [null,null,null,null,null,null,null,null];
		var obligatori = null;
		var tirada = 0;
		var marcador = {"Jugador/a": [null,null,null,null,null,null], "<Tomeu>": [null,null,null,null,null,null]};
		var fcer = {"Jugador/a": [false,false,false,false,false,false], "<Tomeu>": [false,false,false,false,false,false]};
		for (var i = 0; i < n_jugadors; i ++) {
			for (var j = 0; j < n_cat_especials; j ++) {
				marcador[noms[i]].push(null);
				fcer[noms[i]].push(false);
			}
		}

		mostrar();
		
		function jugador_tirar() {
			if (torn%n_jugadors == index_jugador) {
				tirar();

			} else {
				alert("No és el teu torn.");
			}
		}

		// aquesta functió triga 450 ms
		function tirar() {
			if (tirada < 3) {
				cal_tirar = false;
				for (var i = 0; i < 8; i ++) {
					if (fixat[i] == false) {
						daus[i] = null;
					}
				}
				mostrar();
				setTimeout(function(){
					for (var i = 0; i < 8; i ++) {
						if (fixat[i] == false) {
							daus[i] = Math.floor(Math.random()*6);
						}
					}
					mostrar();
					setTimeout(function(){
						for (var i = 0; i < 8; i ++) {
							if (fixat[i] == false) {
								daus[i] = null;
							}
						}
						mostrar();
						setTimeout(function(){
							for (var i = 0; i < 8; i ++) {
								if (fixat[i] == false) {
									daus[i] = Math.floor(Math.random()*6);
								}
							}
							mostrar();
							for (var i = 0; i < 8; i ++) {
								if (fixat[i] == false) {
									daus[i] = null;
								}
							}
							mostrar();
							setTimeout(function(){
								for (var i = 0; i < 8; i ++) {
									if (fixat[i] == false) {
										daus[i] = Math.floor(Math.random()*6);
									}
								}
								mostrar();
								setTimeout(function(){
									for (var i = 0; i < 8; i ++) {
										if (fixat[i] == false) {
											daus[i] = null;
										}
									}
									mostrar();
									setTimeout(function(){
										for (var i = 0; i < 8; i ++) {
											if (fixat[i] == false) {
												daus[i] = Math.floor(Math.random()*6);
											}
										}
										tirada ++;
										mostrar();
									}, 50);
								}, 100);
							}, 50);
						}, 100);
					}, 50);
				}, 100);
			} else {
				alert("Ja has tirat tres cops.");
			}
		}

		function jugador_fixar(i) {
			if (torn%n_jugadors == index_jugador) {
				fixar(i);
			} else {
				alert("No toquis!");
			}
		}

		function fixar(i) {
			if (cal_tirar == true) {
				alert("Has de tirar!");
			} else if (tirada != 0) {
				if (fixat[i] == true) {
					fixat[i] = false;
				} else {
					fixat[i] = true;
				}
			} else {
				alert("Aquests daus no són teus.");
			}
			mostrar();
		}

		function mostrar() {
			for (var i = 0; i < 8; i ++) {
				const cella = document.getElementById("dau" + i.toString());
				cella.innerHTML = "";
				const imatge_dau = document.createElement("img");
				if (daus[i] == null) {
					imatge_dau.src = "./bit/dau_buit.png";
				} else {
					imatge_dau.src = "./bit/dau_" + (["V","N","J","Q","K","A"][daus[i]]) + ".png";
				}
				imatge_dau.width = "50";
				imatge_dau.height = "50";
				cella.appendChild(imatge_dau);
				if (fixat[i] == true) {
					cella.style.backgroundColor = "LightGray";
				} else {
					cella.style.backgroundColor = "white";
				}
			}
		}

		function jugador_puntuar(categoria) {
			if (torn%n_jugadors != index_jugador) {
				alert("No et toca!");
			} else {
				puntuar(categoria);
			}
		}

		function puntuar(categoria) {
			var nom_categoria = categoria;
			if (categoria > 5) {
				nom_categoria = cat_especials[categoria-6];
			}
			var jugador = torn%n_jugadors;
			if (cal_tirar == true || tirada == 0) {
				alert("Has de tirar!");
			} else if (obligatori != null && nom_categoria != obligatori) {
				alert("Ja tens una categoria fixa.");
			} else {
				var distribucio = [0,0,0,0,0,0];
				for (var i = 0; i < 8; i ++) {
					distribucio[daus[i]] ++;
				}
				const punts = evaluar(nom_categoria, distribucio);
				var complet = false;
				if ([0,1,2,3,4,5].includes(categoria)) {
					if (punts == (categoria+1)*8) {
						complet = true;
					}
				} else {
					if (punts != 0) {
						complet = true;
					}
				}
				if (marcador[noms[jugador]][categoria] == null && tirada >= 3) {
					marcador[noms[jugador]][categoria] = punts;
					actualitzar_taula();

					torn ++;
					tirada = 0;
					obligatori = null;
					for (var i = 0; i < 8; i ++) {
						fixat[i] = false;
					}
				} else if (tirada < 3) {
					if (complet == true) {
						obligatori = nom_categoria;
						cal_tirar = true;
						fcer[noms[jugador]][categoria] = true;
						if (marcador[noms[jugador]][categoria] == null) {
							marcador[noms[jugador]][categoria] = punts;
						} else {
							marcador[noms[jugador]][categoria] += punts;
						}
						for (var i = 0; i < 8; i ++) {
							fixat[i] = false;
						}
						actualitzar_taula();
					} else {
						alert("Encara et queden tirades.");
					}
				} else {
					if (fcer[noms[jugador]][categoria] == true) {
						marcador[noms[jugador]][categoria] += punts;
						torn ++;
						tirada = 0;
						obligatori = null;
						for (var i = 0; i < 8; i ++) {
							fixat[i] = false;
						}
						actualitzar_taula();
					} else {
						alert("Ja has puntuat en aquesta categoria.");
					}
				}
				mostrar();
			}
			if (tirada == 0) {
				if (torn == n_jugadors*(6+n_cat_especials)) {
					puntuacions_finals = puntuacions({"jugadors": noms, "categories_especials": cat_especials, "puntuacions": marcador});
					for (var i = 0; i < n_jugadors; i ++) {
						document.getElementById((i+1).toString() + "-suma").innerHTML = puntuacions_finals[noms[i]];
					}
				} else if (torn%n_jugadors != index_jugador) {
					rival();
				}
			}
		}

		function actualitzar_taula() {
			for (var jugador = 0; jugador < n_jugadors; jugador ++) {
				for (var i = 0; i < 6+n_cat_especials; i ++) {
					if (marcador[noms[jugador]][i] == null) {
						document.getElementById((jugador+1).toString() + "-" + i.toString()).innerHTML = "";
					} else {
						document.getElementById((jugador+1).toString() + "-" + i.toString()).innerHTML = marcador[noms[jugador]][i].toString();
					}
				}
			}
		}

		function rival() {
			if (torn%n_jugadors != index_jugador) {
				const nom = noms[torn%n_jugadors];
				var completades = [];
				for (var i = 0; i < 6; i ++) {
					if (marcador[nom][i] != null) {
						completades.push(i);
					}
				}
				for (var i = 0; i < n_cat_especials; i ++) {
					if (marcador[nom][6+i] != null) {
						completades.push(cat_especials[i]);
					}
				}
				const estrategia = constructor_estrategia(nom, cat_especials);
				setTimeout(function() {
					// primera tirada
					tirar();
					setTimeout(function() {
						var taulell = [0,0,0,0,0,0];
						for (var i = 0; i < 8; i ++) {
							taulell[daus[i]] ++;
						}
						var resultat = estrategia.actuar(taulell,completades,obligatori);
						var previ_fixat = resultat[1];
						var quantitat = resultat[0];

						setTimeout(function() {
							for (var i = 0; i < 8; i ++) {
								if (quantitat[daus[i]] > 0) {
									fixar(i);
									quantitat[daus[i]] --;
								}
							}
							if (resultat[1] == true) {
								if ([0,1,2,3,4,5].includes(resultat[2])) {
									puntuar(resultat[2]);
								} else {
									puntuar(6+cat_especials.indexOf(resultat[2]));
								}
							}
							obligatori = resultat[2];


							setTimeout(function() {
								// segona tirada
								tirar();
								setTimeout(function() {
									var taulell = [0,0,0,0,0,0];
									for (var i = 0; i < 8; i ++) {
										taulell[daus[i]] ++;
									}
									var resultat = estrategia.actuar(taulell,completades,obligatori);
									var quantitat = resultat[0];

									setTimeout(function() {
										if (previ_fixat == false) {
											fixat = [false,false,false,false,false,false,false,false];
											for (var i = 0; i < 8; i ++) {
												if (quantitat[daus[i]] > 0) {
													fixar(i);
													quantitat[daus[i]] --;
												}
											}
										}
										previ_fixat = resultat[1];
										if (resultat[1] == true) {
											if ([0,1,2,3,4,5].includes(resultat[2])) {
												puntuar(resultat[2]);
											} else {
												puntuar(6+cat_especials.indexOf(resultat[2]));
											}
										}
										obligatori = resultat[2];


										setTimeout(function() {
											// tercera tirada
											tirar();
											setTimeout(function() {
												var taulell = [0,0,0,0,0,0];
												for (var i = 0; i < 8; i ++) {
													taulell[daus[i]] ++;
												}
												var resultat = estrategia.actuar(taulell,completades,obligatori,ultima=true);
												var quantitat = resultat[0];

												setTimeout(function() {
													if ([0,1,2,3,4,5].includes(resultat[2])) {
														puntuar(resultat[2]);
													} else {
														puntuar(6+cat_especials.indexOf(resultat[2]));
													}

												}, 2000);
											}, 500);
										}, 1000);
									}, 2000);
								}, 500);
							}, 1000);
						}, 2000);
					}, 500);
				}, 1000);
			}
		}

	</script>
</body>
</html>
